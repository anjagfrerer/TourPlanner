@if (vm.isModalOpen()) {
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-xl text-black">
    
    <div class="mb-4 flex items-center justify-between border-b pb-2">
      <h2 class="text-xl font-semibold">
        {{ vm.tour().id !== 0 ? 'Tour bearbeiten' : 'Neue Tour anlegen' }}
      </h2>
      <button type="button" (click)="vm.closeModal()" class="text-gray-500 hover:text-red-500 text-2xl px-2">✕</button>
    </div>

    <form (ngSubmit)="vm.saveTour()" class="space-y-4">
      <div class="grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-medium">Name</label>
          <input type="text" name="Name" [(ngModel)]="vm.tour().name" class="w-full border rounded-xl p-2" required />
        </div>
        <div>
  <label class="block text-sm font-medium">Description</label>
  <textarea 
    rows="3"
    name="Description"
    [(ngModel)]="vm.tour().description"
    class="w-full border rounded-xl p-2"
    required>
  </textarea>
</div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium">From</label>
          <input type="text" name="From" [(ngModel)]="vm.tour().from" class="w-full border rounded-xl p-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium">To</label>
          <input type="text" name="To" [(ngModel)]="vm.tour().to" class="w-full border rounded-xl p-2" required />
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium">Transport Type</label>
          <input type="text" name="TransportType" [(ngModel)]="vm.tour().transportType" class="w-full border rounded-xl p-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium">Distance</label>
          <input type="number" min="0" name="Distance" [(ngModel)]="vm.tour().distance" class="w-full border rounded-xl p-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium">Estimated Time</label>
          <input type="number" min="0" name="EstimatedTime" [(ngModel)]="vm.tour().estimatedTime" class="w-full border rounded-xl p-2" required />
        </div>
      </div>

      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" (click)="vm.closeModal()" class="px-4 py-2 border rounded-xl hover:bg-gray-100 transition-colors">
          Abbrechen
        </button>
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors">
          {{ vm.tour().id !== 0 ? 'Änderungen speichern' : 'Erstellen' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
